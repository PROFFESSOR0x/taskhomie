name: Build Tauri App

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - name: Install frontend dependencies
        run: npm ci
      
      - name: Build Tauri App
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Windows Installer (MSI)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: taskhomie-windows-installer
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: ignore
      
      - name: Upload Windows Installer (NSIS)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: taskhomie-windows-exe-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore
      
      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: taskhomie-windows-exe
          path: src-tauri/target/release/*.exe
          if-no-files-found: ignore

  build-macos:
    name: Build for macOS
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      
      - name: Install frontend dependencies
        run: npm ci
      
      - name: Build Tauri App
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload macOS App
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: taskhomie-macos-app
          path: src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: ignore
      
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: taskhomie-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: ignore

  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev
      
      - name: Install frontend dependencies
        run: npm ci
      
      - name: Build Tauri App
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Linux Deb Package
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: taskhomie-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: ignore
      
      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: taskhomie-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore
      
      - name: Upload Linux RPM Package
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: taskhomie-linux-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: ignore

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: taskhomie-windows-installer
          path: ./artifacts/windows-msi
      
      - name: Download Windows NSIS artifacts
        uses: actions/download-artifact@v4
        with:
          name: taskhomie-windows-exe-installer
          path: ./artifacts/windows-exe
      
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: taskhomie-macos-dmg
          path: ./artifacts/macos
      
      - name: Download Linux Deb artifacts
        uses: actions/download-artifact@v4
        with:
          name: taskhomie-linux-deb
          path: ./artifacts/linux-deb
      
      - name: Download Linux AppImage artifacts
        uses: actions/download-artifact@v4
        with:
          name: taskhomie-linux-appimage
          path: ./artifacts/linux-appimage
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/windows-msi/*.msi
            ./artifacts/windows-exe/*.exe
            ./artifacts/macos/*.dmg
            ./artifacts/linux-deb/*.deb
            ./artifacts/linux-appimage/*.AppImage
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
